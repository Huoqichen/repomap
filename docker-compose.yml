services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      REPOMAP_CORS_ORIGINS: http://localhost:3000
      REPOMAP_JOB_BACKEND: redis
      REPOMAP_REDIS_URL: redis://redis:6379/0
      REPOMAP_QUEUE_NAME: repomap-analysis
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "-m", "repomap_api.worker"]
    environment:
      REPOMAP_JOB_BACKEND: redis
      REPOMAP_REDIS_URL: redis://redis:6379/0
      REPOMAP_QUEUE_NAME: repomap-analysis
    depends_on:
      - redis

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        REPOMAP_API_URL: http://api:8000
    environment:
      REPOMAP_API_URL: http://api:8000
      ALLOWED_DEV_ORIGINS: localhost,127.0.0.1,192.168.164.1
    depends_on:
      - api
    ports:
      - "3000:3000"
