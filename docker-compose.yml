services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      REPOMAP_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        REPOMAP_API_URL: http://api:8000
    environment:
      REPOMAP_API_URL: http://api:8000
      ALLOWED_DEV_ORIGINS: localhost,127.0.0.1,192.168.164.1
    depends_on:
      - api
    ports:
      - "3000:3000"
